services:
  agentic-backend:
    build:
      context: ./backend
    image: oracle-fusion-learning-agentic-ai-python-backend:latest
    ports:
      - "8000:8000"
    environment:
      PYTHON_AGENTIC_HOST: 0.0.0.0
      PYTHON_AGENTIC_PORT: 8000
      ORACLE_AGENTIC_PROVIDER: mock

  compliance-manager:
    build:
      context: .
    image: oracle-fusion-learning-agentic-ai:latest
    depends_on:
      - agentic-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PYTHON_AGENTIC_BACKEND_URL: http://agentic-backend:8000
